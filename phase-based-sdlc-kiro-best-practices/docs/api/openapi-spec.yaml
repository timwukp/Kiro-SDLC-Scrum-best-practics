openapi: 3.1.0
info:
  title: Banking Platform API
  version: 1.0.0
  description: Core Banking API for account management and transactions
  contact:
    name: Platform Engineering
    email: platform@bank.example.com

servers:
  - url: https://api.bank.example.com/api/v1
    description: Production
  - url: https://api-staging.bank.example.com/api/v1
    description: Staging

security:
  - bearerAuth: []

paths:
  /accounts:
    get:
      summary: List customer accounts
      operationId: listAccounts
      tags: [Accounts]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: List of accounts
          headers:
            X-Request-ID:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 0, minimum: 0 }
    SizeParam:
      name: size
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }

  schemas:
    AccountListResponse:
      type: object
      properties:
        requestId: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        data:
          type: array
          items: { $ref: '#/components/schemas/Account' }
        page: { $ref: '#/components/schemas/PageInfo' }

    Account:
      type: object
      properties:
        id: { type: string, format: uuid }
        accountNumber: { type: string }
        accountType: { type: string, enum: [SAVINGS, CURRENT, FIXED_DEPOSIT] }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        balance: { type: string, description: 'Monetary amount as string' }
        status: { type: string, enum: [ACTIVE, FROZEN, CLOSED] }

    PageInfo:
      type: object
      properties:
        number: { type: integer }
        size: { type: integer }
        totalElements: { type: integer }
        totalPages: { type: integer }

    ErrorResponse:
      type: object
      properties:
        requestId: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        status: { type: integer }
        error: { type: string }
        message: { type: string }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              reason: { type: string }

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
